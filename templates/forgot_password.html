{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-md-5">

    <div class="card border-0 shadow-sm">
      <div class="card-body">

        <h3 class="mb-3 text-center">Forgot Password</h3>
        <p class="text-muted text-center">Enter your account email to receive a reset OTP.</p>

        <form method="POST">
          <div class="mb-4">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" required>
          </div>

          <div class="d-grid gap-2">
            <button class="btn btn-primary">Send Reset OTP</button>
            <a href="{{ url_for('auth.login') }}" class="btn btn-outline-secondary">Back to Login</a>
          </div>
        </form>

      </div>
    </div>

  </div>
</div>

{% endblock %}
