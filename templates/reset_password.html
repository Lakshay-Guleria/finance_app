{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-md-5">

    <div class="card border-0 shadow-sm">
      <div class="card-body">

        <h3 class="mb-3 text-center">Reset Password</h3>
        <p class="text-muted text-center">
          Enter the OTP sent to <strong>{{ pending_email }}</strong> and choose a new password.
        </p>

        <form method="POST">
          <div class="mb-3">
            <label class="form-label">OTP Code</label>
            <input
              type="text"
              name="otp_code"
              maxlength="6"
              class="form-control"
              placeholder="Enter 6-digit OTP"
              required
            >
          </div>

          <div class="mb-4">
            <label class="form-label">New Password</label>
            <div class="input-group">
              <input
                type="password"
                name="new_password"
                class="form-control"
                id="resetPassword"
                required
              >
              <button
                class="btn btn-outline-secondary password-toggle"
                type="button"
                data-target="resetPassword"
                aria-label="Show password"
              >
                Show
              </button>
            </div>
          </div>

          <div class="d-grid gap-2">
            <button class="btn btn-primary">Update Password</button>
          </div>
        </form>

        <form method="POST" action="{{ url_for('auth.resend_reset_otp') }}" class="mt-3">
          <div class="d-grid gap-2">
            <button class="btn btn-outline-secondary">Resend OTP</button>
            <a href="{{ url_for('auth.login') }}" class="btn btn-outline-secondary">Back to Login</a>
          </div>
        </form>

      </div>
    </div>

  </div>
</div>

{% endblock %}
