{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

  <div class="col-md-6 col-lg-5">

    <div class="card border-0 shadow-sm">

      <!-- Header -->
      <div class="card-body">

        <h3 class="mb-4 text-center">Create Budget</h3>

        {% if categories %}

        <form method="POST">

          <!-- Category -->
          <div class="mb-3">
            <label class="form-label">Category</label>
            <select name="category_id" class="form-select" required>
              {% for cat in categories %}
                <option value="{{ cat.id }}">{{ cat.name }}</option>
              {% endfor %}
            </select>
          </div>

          <!-- Month + Year in one row -->
          <div class="row">
            <div class="col">
              <div class="mb-3">
                <label class="form-label">Month</label>
                <input type="number" name="month" min="1" max="12"
                       class="form-control" value="{{ default_month }}" required>
              </div>
            </div>

            <div class="col">
              <div class="mb-3">
                <label class="form-label">Year</label>
                <input type="number" name="year"
                       class="form-control" value="{{ default_year }}" required>
              </div>
            </div>
          </div>

          <!-- Limit -->
          <div class="mb-4">
            <label class="form-label">Limit Amount</label>
            <input type="number" step="0.01" name="limit_amount"
                   class="form-control" placeholder="Enter amount" required>
          </div>

          <!-- Buttons -->
          <div class="d-grid gap-2">
            <button type="submit" class="btn btn-success">
              Create Budget
            </button>

            <a href="{{ url_for('budgets.budgets') }}"
               class="btn btn-outline-secondary">
              Cancel
            </a>
          </div>

        </form>

        {% else %}

        <div class="alert alert-warning text-center">
          No expense categories found.
        </div>

        <div class="text-center">
          <a href="{{ url_for('categories.create_category') }}"
             class="btn btn-primary">
            Create Category
          </a>
        </div>

        {% endif %}

      </div>
    </div>

  </div>

</div>

{% endblock %}
