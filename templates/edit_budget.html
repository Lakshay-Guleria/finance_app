{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">

    <div class="card border-0 shadow-sm">
      <div class="card-body">

        <h3 class="mb-4 text-center">Edit Budget</h3>

        <form method="POST">

          <div class="mb-3">
            <label class="form-label">Category</label>
            <select name="category_id" class="form-select">
              {% for category in categories %}
              <option value="{{ category.id }}"
                {% if category.id == budget.category_id %}selected{% endif %}>
                {{ category.name }}
              </option>
              {% endfor %}
            </select>
          </div>

          <div class="row">
            <div class="col">
              <div class="mb-3">
                <label class="form-label">Month</label>
                <input type="number" name="month"
                       class="form-control"
                       value="{{ budget.month }}">
              </div>
            </div>

            <div class="col">
              <div class="mb-3">
                <label class="form-label">Year</label>
                <input type="number" name="year"
                       class="form-control"
                       value="{{ budget.year }}">
              </div>
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label">Limit Amount</label>
            <input type="number" step="0.01" name="limit_amount"
                   class="form-control"
                   value="{{ budget.limit_amount }}">
          </div>

          <div class="d-grid gap-2">
            <button class="btn btn-primary">Update</button>
            <a href="{{ url_for('budgets.budgets') }}"
               class="btn btn-outline-secondary">Cancel</a>
          </div>

        </form>

      </div>
    </div>

  </div>
</div>

{% endblock %}
